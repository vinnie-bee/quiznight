<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Journey RPG</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:Cinzel, serif;
    color:#f5e6c8;
    background-size:cover;
    background-position:center;
    transition:10s;
}

/* LOGIN */
#login {
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
}

.box {
    background:rgba(20,14,8,0.95);
    padding:25px;
    border:2px solid #c9a227;
    border-radius:12px;
    width:300px;
}

/* GAME LAYOUT */
#game {
    display:none;
    height:100vh;
    display:flex;
}

.left {
    flex:3;
    padding:20px;
}

.right {
    flex:1;
    background:rgba(0,0,0,0.75);
    padding:20px;
    border-left:2px solid #c9a227;
}

/* ROAD (zeppelin style) */
.road {
    position:relative;
    display:flex;
    align-items:center;
    margin-bottom:20px;
}

.road::before {
    content:"";
    position:absolute;
    width:100%;
    height:2px;
    background:#c9a227;
    opacity:0.4;
    top:50%;
}

.node {
    width:14px;
    height:14px;
    border-radius:50%;
    border:2px solid #c9a227;
    background:black;
    margin-right:60px;
    z-index:2;
    opacity:0.4;
    transition:0.5s;
}

.node.done {
    background:#c9a227;
    opacity:1;
}

.node.current {
    animation:pulse 1s infinite;
}

@keyframes pulse {
    0%{transform:scale(1)}
    50%{transform:scale(1.4)}
    100%{transform:scale(1)}
}

/* INPUT */
input, button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:none;
}

input {
    background:rgba(0,0,0,0.5);
    color:#f5e6c8;
    border:1px solid #c9a227;
}

/* QUEST LOG */
.log {
    margin-top:15px;
    font-size:12px;
    max-height:200px;
    overflow:auto;
    border-top:1px solid #3a2f1d;
    padding-top:10px;
}

.logEntry {
    margin-bottom:6px;
    opacity:0.85;
}

/* INVENTORY */
.item {
    padding:6px;
    border:1px solid #c9a227;
    margin:4px;
    display:inline-block;
    cursor:pointer;
}

/* TRAVEL SCREEN */
#loading {
    position:fixed;
    inset:0;
    display:none;
    background:black;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

#loading p {
    color:#ffd36a;
}

/* VICTORY */
#victory {
    display:none;
    text-align:center;
    padding:50px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h2>Enter Name</h2>
    <input id="name">
    <button onclick="start()">Begin Journey</button>
  </div>
</div>

<!-- TRAVEL -->
<div id="loading">
  <h2>Traveling...</h2>
  <p id="travelText"></p>
</div>

<!-- GAME -->
<div id="game">

<div class="left">

<div class="road" id="road"></div>

<h2 id="zone"></h2>
<p id="clue"></p>

<input id="input">
<button onclick="submit()">Submit</button>

<div id="msg"></div>

</div>

<div class="right">

<h3>👤 Player</h3>
<p id="player"></p>

<h3>🎒 Inventory</h3>
<div id="inv"></div>

<h3>📜 Quest Journal</h3>
<div class="log" id="log"></div>

</div>

</div>

<div id="victory">
<h1>🏆 Journey Complete</h1>
<p id="title"></p>
</div>

<script>

/* WORLD */
const zones = [
{
name:"Overwatch Watchpoint",
bg:"https://r4.wallpaperflare.com/wallpaper/445/688/1024/4k-overwatch-widowmaker-wallpaper-d33462865149854f9bb7011a1a241254.jpg",
travel:"Arriving at Watchpoint Gibraltar...",
puzzles:[
{q:"tracer", clue:"Fastest hero.", hint:"Time manipulation user."},
{q:"reaper", clue:"Death walks again.", hint:"Shadow and shotguns."},
{q:"overwatch", clue:"Organization reborn.", hint:"Global hero task force."}
],
item:"Pulse Badge"
},

{
name:"League of Legends Rift",
bg:"https://www.allkeyshop.com/blog/wp-content/uploads/LoL-Champions-resized.webp",
travel:"Crossing into the Summoner's Rift...",
puzzles:[
{q:"yasuo", clue:"Wind never stops.", hint:"Unforgiven swordsman."},
{q:"jinx", clue:"Chaos follows.", hint:"Explosive chaos lover."},
{q:"nexus", clue:"Heart of the game.", hint:"Core structure."}
],
item:"Hex Core"
},

{
name:"World of Warcraft Azeroth",
bg:"https://bnetcmsus-a.akamaihd.net/cms/blog_header/wn/WNVJRL5YVDSB1764095280016.png",
travel:"Entering Azeroth...",
puzzles:[
{q:"arthas", clue:"The fallen king.", hint:"Lich King origin."},
{q:"horde", clue:"For the Horde.", hint:"Faction war cry."},
{q:"azeroth", clue:"The world itself.", hint:"Planet name."}
],
item:"Frost Relic"
}
];

let player="";
let z=0, p=0;
let inv=[];
let hintsUsed=0;
let journal=[];

/* START */
function start(){
player=document.getElementById("name").value||"Traveler";
document.getElementById("login").style.display="none";
document.getElementById("game").style.display="flex";
document.getElementById("player").innerText=player;
log("Journey started by "+player);
travel();
}

/* ROAD */
function renderRoad(){
let r=document.getElementById("road");
r.innerHTML="";
zones.forEach((_,i)=>{
let d=document.createElement("div");
d.className="node";
if(i<z) d.classList.add("done");
if(i===z) d.classList.add("current");
r.appendChild(d);
});
}

/* TRAVEL SCREEN */
function travel(){
document.getElementById("loading").style.display="flex";
document.getElementById("travelText").innerText=zones[z].travel;

setTimeout(()=>{
document.getElementById("loading").style.display="none";
render();
},2200);
}

/* RENDER */
function render(){
if(z>=zones.length){ end(); return; }

document.body.style.background=`url('${zones[z].bg}') center/cover`;

document.getElementById("zone").innerText=zones[z].name;
document.getElementById("clue").innerText=zones[z].puzzles[p].clue;

renderRoad();
renderInv();
renderLog();
}

/* INVENTORY */
function renderInv(){
document.getElementById("inv").innerHTML=
inv.map((i,idx)=>`<div class="item" onclick="use(${idx})">${i}</div>`).join("");
}

/* USE ITEM */
function use(i){
if(!confirm("Use item to reveal hint? It will be consumed.")) return;

alert("💡 HINT: " + zones[z].puzzles[p].hint);

inv.splice(i,1);
hintsUsed++;

log("Hint used in "+zones[z].name);

renderInv();
}

/* SUBMIT */
function submit(){
let v=document.getElementById("input").value.toLowerCase();

if(v===zones[z].puzzles[p].q){

document.getElementById("input").value="";

log("Solved: "+zones[z].puzzles[p].q);

p++;

if(p>=zones[z].puzzles.length){
inv.push(zones[z].item);
z++; p=0;

log("Zone completed: "+zones[z-1].name);

travel();
} else {
log("Next objective unlocked");
}

render();

} else {
log("Failed attempt");
}
}

/* JOURNAL */
function log(t){
journal.unshift(t);
}

/* RENDER LOG */
function renderLog(){
document.getElementById("log").innerHTML=
journal.map(j=>`<div class="logEntry">${j}</div>`).join("");
}

/* TITLE */
function title(){
if(hintsUsed===0) return "🏆 Mythic Explorer";
if(hintsUsed<=2) return "⭐ Skilled Traveler";
return "🪶 Casual Wanderer";
}

/* END */
function end(){
document.getElementById("game").style.display="none";
document.getElementById("victory").style.display="block";
document.getElementById("title").innerText=
player+" → "+title();
}

</script>

</body>
</html>
