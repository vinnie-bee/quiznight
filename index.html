<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quest Journey RPG</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
margin:0;
font-family:Cinzel, serif;
background-size:cover;
background-position:center;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
transition:1s;
color:#f5e6c8;
}

/* LOGIN (RESTORED SIMPLE) */
#login {
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

.box {
background:rgba(20,14,8,0.95);
padding:25px;
border:2px solid #c9a227;
border-radius:12px;
width:300px;
text-align:center;
}

/* GAME */
#game {
display:none;
width:900px;
height:600px;
background:rgba(0,0,0,0.65);
border:2px solid #c9a227;
border-radius:12px;
overflow:hidden;
display:flex;
}

/* LEFT */
.left {
flex:3;
padding:25px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* RIGHT */
.right {
flex:1;
background:rgba(0,0,0,0.75);
padding:20px;
border-left:2px solid #c9a227;
}

/* MAP (STRAIGHT PATH) */
.map {
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-bottom:20px;
position:relative;
}

.node {
width:12px;
height:12px;
border-radius:50%;
background:#c9a227;
opacity:0.4;
}

.node.big {
width:20px;
height:20px;
opacity:1;
box-shadow:0 0 10px #c9a227;
}

.node.current {
animation:pulse 1s infinite;
}

@keyframes pulse {
0%{transform:scale(1)}
50%{transform:scale(1.4)}
100%{transform:scale(1)}
}

/* INPUT */
input {
width:250px;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #c9a227;
background:rgba(0,0,0,0.5);
color:#f5e6c8;
text-align:center;
}

/* BUTTON */
button {
width:150px;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
cursor:pointer;
}

/* MUTE BUTTON */
#muteBtn {
position:fixed;
top:10px;
right:10px;
background:#c9a227;
border:none;
padding:8px 10px;
border-radius:8px;
cursor:pointer;
}

/* SHAKE */
.shake {
animation:shake 0.3s;
}

@keyframes shake {
0%{transform:translate(0)}
25%{transform:translate(5px)}
50%{transform:translate(-5px)}
100%{transform:translate(0)}
}
</style>
</head>

<body>

<button id="muteBtn" onclick="toggleMute()">🔊</button>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h2>Enter Name</h2>
<input id="name">
<button onclick="start()">Begin Journey</button>
</div>
</div>

<!-- GAME -->
<div id="game">

<div class="left">

<div class="map" id="map"></div>

<h2 id="zone"></h2>
<p id="clue"></p>

<input id="input">
<button onclick="submit()">Submit</button>

</div>

<div class="right">
<h3>Progress</h3>
<p id="progress"></p>
</div>

</div>

<audio id="music" loop></audio>

<script>

/* WORLDS (REAL ANSWERS RESTORED) */
const zones = [
{
name:"Overwatch",
music:"Overwatch.mp3",
bg:"https://images.unsplash.com/photo-1446776811953-b23d57bd21aa",
puzzles:[
{q:"tracer", clue:"Fastest hero."},
{q:"reaper", clue:"Death walks again."},
{q:"overwatch", clue:"Hero organization."}
]
},
{
name:"The War Within",
music:"Warwithin.mp3",
bg:"https://r4.wallpaperflare.com/wallpaper/698/492/43/world-of-warcraft-world-of-warcraft-the-war-within-hd-wallpaper-3a52424eeb03db6148e64273c8a63109.jpg",
puzzles:[
{q:"khaz algar", clue:"Deep titan domain."},
{q:"dornogal", clue:"City of earth."},
{q:"earthen", clue:"New titan race."}
]
},
{
name:"Midnight",
music:"Warwithin.mp3",
bg:"https://r4.wallpaperflare.com/wallpaper/224/132/933/world-of-warcraft-warcraft-world-of-warcraft-midnight-blood-elves-hd-wallpaper-0ae3578987f2a8ee6dd8471e4853cca4.jpg",
puzzles:[
{q:"quelthalas", clue:"Elven homeland."},
{q:"sunwell", clue:"Arcane source."},
{q:"scourge", clue:"Undead threat."}
]
}
];

let z=0, p=0;
let muted=false;

/* START */
function start(){
document.getElementById("login").style.display="none";
document.getElementById("game").style.display="flex";
playMusic();
render();
}

/* MUSIC */
function playMusic(){
let m=document.getElementById("music");
m.src=zones[z].music;
m.volume=1;
if(!muted) m.play();
}

/* MUTE */
function toggleMute(){
let m=document.getElementById("music");
muted=!muted;
m.muted=muted;
document.getElementById("muteBtn").innerText = muted ? "🔇" : "🔊";
}

/* MAP */
function renderMap(){
let m=document.getElementById("map");
m.innerHTML="";

for(let i=0;i<3;i++){

let big=document.createElement("div");
big.className="node big";
if(i===z) big.classList.add("current");
m.appendChild(big);

if(i<2){
for(let j=0;j<2;j++){
let small=document.createElement("div");
small.className="node";
m.appendChild(small);
}
}
}
}

/* RENDER */
function render(){

if(z>=zones.length){
document.body.innerHTML="<h1>🏆 Victory</h1>";
return;
}

document.body.style.background=`url('${zones[z].bg}') center/cover`;

document.getElementById("zone").innerText=zones[z].name;
document.getElementById("clue").innerText=zones[z].puzzles[p].clue;

document.getElementById("progress").innerText=
`Chapter ${z+1}: ${p+1}/3`;

renderMap();
}

/* SUBMIT */
function submit(){
let v=document.getElementById("input").value.toLowerCase().trim();

if(v===zones[z].puzzles[p].q){

document.getElementById("input").value="";
p++;

if(p>=3){
z++; p=0;
playMusic();
}

render();

} else {
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),300);
}
}

</script>

</body>
</html>
