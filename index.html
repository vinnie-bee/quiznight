<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest of Shadows - World Map</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: "Cinzel", serif;
    color: #f5e6c8;
    background: url("https://images.unsplash.com/photo-1503264116251-35a269479413") center/cover fixed;
}

.overlay {
    min-height: 100vh;
    background: rgba(0,0,0,0.7);
    display: flex;
}

/* LEFT PANEL = MAP */
.map {
    flex: 2;
    padding: 20px;
}

.world {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

.zone {
    border: 2px solid #c9a227;
    border-radius: 12px;
    height: 160px;
    background-size: cover;
    background-position: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
}

.zone.locked {
    filter: grayscale(1) brightness(0.3);
    cursor: not-allowed;
}

.zone:hover:not(.locked) {
    transform: scale(1.03);
}

.zone span {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: rgba(0,0,0,0.6);
    padding: 5px 10px;
    border-radius: 8px;
}

/* RIGHT PANEL = UI */
.ui {
    flex: 1;
    padding: 20px;
    background: rgba(20,14,8,0.95);
    border-left: 2px solid #c9a227;
}

h2 {
    margin-top: 0;
    color: #ffd36a;
}

.questbox {
    margin-top: 15px;
    padding: 10px;
    border: 1px solid #3a2f1d;
    border-radius: 10px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #c9a227;
    cursor: pointer;
}

button:hover { filter: brightness(1.1); }

.msg {
    margin-top: 10px;
    min-height: 20px;
}

.success { color: #7CFC90; }
.error { color: #ff6b6b; }

.badge {
    display:inline-block;
    padding:5px 8px;
    margin:3px;
    border:1px solid #c9a227;
    border-radius:6px;
    font-size:12px;
}

.lockNotice {
    font-size: 12px;
    opacity: 0.7;
}

.boss {
    display:none;
    text-align:center;
    padding:40px;
}
</style>
</head>

<body>

<div class="overlay">

<!-- WORLD MAP -->
<div class="map">

<h1>🗺️ World of Shadows</h1>
<p>Select a zone you have unlocked</p>

<div class="world" id="world"></div>

</div>

<!-- UI PANEL -->
<div class="ui">

<h2>📜 Quest Log</h2>

<div id="quest"></div>

<div class="questbox">
<input id="input" placeholder="Enter rune..." />
<button onclick="submit()">Submit</button>
<div class="msg" id="msg"></div>
</div>

<h3>🧳 Inventory</h3>
<div id="inv"></div>

</div>

</div>

<!-- BOSS SCREEN -->
<div class="boss" id="boss">
<h1>🏆 THE FINAL CHAMBER</h1>
<p>You have conquered the realm of shadows.</p>
<p style="color:#ffd36a;">Only legends reach this point.</p>
</div>

<script>

const zones = [
{
name:"Forgotten Gate",
password:"dragon",
clue:"Where fire once slept.",
bg:"https://images.unsplash.com/photo-1503264116251-35a269479413",
item:"Ember Sigil"
},
{
name:"Hall of Echoes",
password:"phoenix",
clue:"Death is never the end.",
bg:"https://images.unsplash.com/photo-1519681393784-d120267933ba",
item:"Echo Fragment"
},
{
name:"Vault of Stars",
password:"nebula",
clue:"The sky hides truth.",
bg:"https://images.unsplash.com/photo-1446776811953-b23d57bd21aa",
item:"Star Dust"
},
{
name:"Final Chamber",
password:"treasure",
clue:"Speak the final name.",
bg:"https://images.unsplash.com/photo-1470770841072-f978cf4d019e",
item:"Crown of Completion"
}
];

let index = parseInt(localStorage.getItem("mmo_index")) || 0;
let inv = JSON.parse(localStorage.getItem("mmo_inv") || "[]");

function save(){
localStorage.setItem("mmo_index", index);
localStorage.setItem("mmo_inv", JSON.stringify(inv));
}

function renderWorld(){

let world = document.getElementById("world");
world.innerHTML = "";

zones.forEach((z,i)=>{

let locked = i > index;

let div = document.createElement("div");
div.className = "zone" + (locked ? " locked":"");
div.style.backgroundImage = `url(${z.bg})`;

div.innerHTML = `<span>${z.name}</span>`;

div.onclick = () => {
if(locked) return;
showQuest(i);
};

world.appendChild(div);

});
}

let currentZone = index;

function showQuest(i){
currentZone = i;

document.getElementById("quest").innerHTML =
`
<h3>${zones[i].name}</h3>
<p>${zones[i].clue}</p>
<p class="lockNotice">Zone ${i+1}/${zones.length}</p>
`;
}

function submit(){

let val = document.getElementById("input").value.toLowerCase().trim();
let msg = document.getElementById("msg");

if(val === "azeroth"){
msg.textContent = "👁 You whisper forbidden knowledge...";
msg.className="msg error";
return;
}

if(val === zones[currentZone].password){

if(currentZone === index){
index++;
inv.push(zones[currentZone].item);
save();
}

msg.textContent = "✔ Quest completed!";
msg.className="msg success";

document.getElementById("input").value="";

renderWorld();
showQuest(Math.min(currentZone,index));

if(index >= zones.length){
document.getElementById("world").style.display="none";
document.querySelector(".ui").style.display="none";
document.getElementById("boss").style.display="block";
}

} else {
msg.textContent = "✖ The rune fails.";
msg.className="msg error";
}
}

function renderInv(){
document.getElementById("inv").innerHTML =
inv.map(i=>`<span class="badge">${i}</span>`).join("");
}

renderWorld();
showQuest(index);
renderInv();

</script>

</body>
</html>
