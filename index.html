<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adventure Map RPG</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
margin:0;
font-family:Cinzel, serif;
color:#f5e6c8;
background-size:cover;
background-position:center;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
transition:1s;
}

/* LOGIN */
#login {
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

.box {
background:rgba(20,14,8,0.95);
padding:25px;
border:2px solid #c9a227;
border-radius:12px;
width:300px;
text-align:center;
}

/* GAME */
#game {
display:none;
width:900px;
height:600px;
background:rgba(0,0,0,0.65);
border:2px solid #c9a227;
border-radius:12px;
overflow:hidden;
display:flex;
}

/* LEFT */
.left {
flex:3;
padding:25px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* RIGHT */
.right {
flex:1;
background:rgba(0,0,0,0.75);
padding:20px;
border-left:2px solid #c9a227;
}

/* MAP (CURVED TREASURE STYLE) */
.map {
position:relative;
height:80px;
width:100%;
margin-bottom:15px;
}

.path {
position:absolute;
width:100%;
height:80px;
}

.node {
position:absolute;
width:10px;
height:10px;
border-radius:50%;
background:#c9a227;
opacity:0.4;
}

.node.big {
width:22px;
height:22px;
opacity:1;
box-shadow:0 0 15px #c9a227;
}

.node.current {
animation:pulse 1s infinite;
}

@keyframes pulse {
0%{transform:scale(1)}
50%{transform:scale(1.5)}
100%{transform:scale(1)}
}

/* INPUT */
input {
width:250px;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #c9a227;
background:rgba(0,0,0,0.5);
color:#f5e6c8;
text-align:center;
}

/* RAID BOSS */
#boss {
display:none;
text-align:center;
}

/* SHAKE */
.shake {
animation:shake 0.3s;
}

@keyframes shake {
0%{transform:translate(0)}
25%{transform:translate(5px)}
50%{transform:translate(-5px)}
100%{transform:translate(0)}
}

/* FLASH */
.flash {
animation:flash 0.4s;
}

@keyframes flash {
0%{box-shadow:0 0 0 #c9a227}
50%{box-shadow:0 0 30px #c9a227}
100%{box-shadow:0 0 0 #c9a227}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h2>Enter Name</h2>
<input id="name">
<button onclick="start()">Begin Journey</button>
</div>
</div>

<!-- GAME -->
<div id="game">

<div class="left">

<div class="map" id="map"></div>

<h2 id="zone"></h2>
<p id="clue"></p>

<input id="input">
<button onclick="submit()">Submit</button>

</div>

<div class="right">
<h3>Progress</h3>
<p id="progress"></p>
</div>

</div>

<!-- RAID BOSS -->
<div id="boss">
<h1>⚔️ FINAL RAID: The Gatekeeper</h1>
<p id="bossText"></p>
<input id="bossInput">
<button onclick="bossSubmit()">Strike</button>
</div>

<script>

/* WORLDS (3) */
const zones = [
{
name:"Overwatch",
bg:"https://images.unsplash.com/photo-1446776811953-b23d57bd21aa",
puzzles:randomSet("ow",3)
},
{
name:"The War Within",
bg:"https://r4.wallpaperflare.com/wallpaper/698/492/43/world-of-warcraft-world-of-warcraft-the-war-within-hd-wallpaper-3a52424eeb03db6148e64273c8a63109.jpg",
puzzles:randomSet("tww",3)
},
{
name:"Midnight",
bg:"https://r4.wallpaperflare.com/wallpaper/224/132/933/world-of-warcraft-warcraft-world-of-warcraft-midnight-blood-elves-hd-wallpaper-0ae3578987f2a8ee6dd8471e4853cca4.jpg",
puzzles:randomSet("mid",3)
}
];

let z=0, p=0;

/* RANDOM PUZZLES */
function randomSet(prefix,n){
return Array.from({length:n},(_,i)=>({
q:prefix+i,
clue:`Decode ${prefix.toUpperCase()} signal ${i+1}`,
hint:`Hidden hint ${i+1} of ${prefix}`
}));
}

/* START */
function start(){
document.getElementById("login").style.display="none";
document.getElementById("game").style.display="flex";
render();
}

/* MAP (CURVED + BIG CHAPTER DOTS) */
function renderMap(){
let m=document.getElementById("map");
m.innerHTML="";

let spacing=80;

zones.forEach((_,i)=>{
let big=document.createElement("div");
big.className="node big";
big.style.left=(i*spacing+40)+"px";
big.style.top=(Math.sin(i)*10+30)+"px";

if(i===z) big.classList.add("current");

m.appendChild(big);

for(let j=0;j<3;j++){
let small=document.createElement("div");
small.className="node";
small.style.left=(i*spacing+20+j*15)+"px";
small.style.top=(Math.sin(i)*10+40+j*5)+"px";

if(i<z || (i===z && j<p)) small.style.opacity="1";

m.appendChild(small);
}
});
}

/* RENDER */
function render(){
if(z>=zones.length){ boss(); return; }

document.body.style.background=`url('${zones[z].bg}') center/cover`;

document.getElementById("zone").innerText=zones[z].name;
document.getElementById("clue").innerText=zones[z].puzzles[p].clue;

document.getElementById("progress").innerText=
`Chapter ${z+1}: ${p}/3`;

renderMap();
}

/* SUBMIT */
function submit(){
let v=document.getElementById("input").value.toLowerCase();

if(v===zones[z].puzzles[p].q){

document.getElementById("input").value="";

p++;

if(p>=3){
z++; p=0;
}

render();

} else {
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),300);
}
}

/* RAID BOSS */
function boss(){
document.getElementById("game").style.display="none";
document.getElementById("boss").style.display="block";

document.getElementById("bossText").innerText=
"Phase 1: Enter the sigil (ow1 / tww2 / mid0 pattern)";
}

function bossSubmit(){
let v=document.getElementById("bossInput").value.toLowerCase();

if(v.includes("ow") && v.includes("tww") && v.includes("mid")){
alert("⚔️ Gate Broken. Victory!");
} else {
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),300);
}
}

</script>

</body>
</html>
