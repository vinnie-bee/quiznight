<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Journey RPG</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
margin:0;
font-family:Cinzel, serif;
color:#f5e6c8;
background-size:cover;
background-position:center;
transition:1s;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* LOGIN */
#login {
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

.box {
background:rgba(20,14,8,0.95);
padding:25px;
border:2px solid #c9a227;
border-radius:12px;
width:300px;
text-align:center;
}

/* GAME */
#game {
display:none;
width:900px;
height:600px;
background:rgba(0,0,0,0.65);
border:2px solid #c9a227;
border-radius:12px;
overflow:hidden;
display:flex;
}

/* LEFT */
.left {
flex:3;
padding:25px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* RIGHT */
.right {
flex:1;
background:rgba(0,0,0,0.75);
padding:20px;
border-left:2px solid #c9a227;
display:flex;
flex-direction:column;
align-items:center;
}

/* ROAD */
.road {
display:flex;
justify-content:center;
align-items:center;
gap:12px;
margin-bottom:20px;
position:relative;
}

.road::before {
content:"";
position:absolute;
width:80%;
height:2px;
background:#c9a227;
opacity:0.4;
top:50%;
}

.node {
width:14px;
height:14px;
border-radius:50%;
border:2px solid #c9a227;
background:black;
opacity:0.3;
z-index:2;
}

.node.done { background:#c9a227; opacity:1; }
.node.current { animation:pulse 1s infinite; }

@keyframes pulse {
0%{transform:scale(1)}
50%{transform:scale(1.4)}
100%{transform:scale(1)}
}

/* INPUT */
.inputBox {
display:flex;
flex-direction:column;
align-items:center;
margin-top:15px;
}

input {
width:250px;
padding:10px;
border-radius:10px;
border:1px solid #c9a227;
background:rgba(0,0,0,0.5);
color:#f5e6c8;
text-align:center;
}

button {
width:150px;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
cursor:pointer;
}

/* LOG */
.log {
margin-top:10px;
font-size:12px;
max-height:200px;
overflow:auto;
text-align:left;
width:100%;
}

.logEntry {
margin-bottom:5px;
}

.doneText {
text-decoration:line-through;
opacity:0.5;
}

/* MUTE BUTTON */
#muteBtn {
position:fixed;
top:10px;
right:10px;
background:#c9a227;
border:none;
padding:8px 12px;
cursor:pointer;
border-radius:8px;
}

/* DIALOG */
#dialog {
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.85);
}

.dialogBox {
background:#1a1410;
border:2px solid #c9a227;
padding:25px;
width:350px;
text-align:center;
border-radius:12px;
}

/* SCREEN SHAKE */
.shake {
animation:shake 0.3s;
}

@keyframes shake {
0%{transform:translate(0,0)}
25%{transform:translate(5px,0)}
50%{transform:translate(-5px,0)}
75%{transform:translate(5px,0)}
100%{transform:translate(0,0)}
}

/* SPELL FX */
.flash {
animation:flash 0.5s;
}

@keyframes flash {
0%{box-shadow:0 0 0px #c9a227}
50%{box-shadow:0 0 40px #c9a227}
100%{box-shadow:0 0 0px #c9a227}
}
</style>
</head>

<body>

<button id="muteBtn" onclick="toggleMute()">🔊</button>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h2>Enter Name</h2>
<input id="name">
<button onclick="start()">Begin Journey</button>
</div>
</div>

<!-- QUEST DIALOG -->
<div id="dialog">
<div class="dialogBox">
<h3 id="dTitle"></h3>
<p id="dText"></p>
<button onclick="acceptChoice()">Accept</button>
<button onclick="acceptChoice()">Refuse (forced anyway 😄)</button>
</div>
</div>

<!-- GAME -->
<div id="game">

<div class="left">

<div class="road" id="road"></div>

<h2 id="zone"></h2>
<p id="clue"></p>

<div class="inputBox">
<input id="input" placeholder="Enter answer...">
<button onclick="submit()">Submit</button>
</div>

</div>

<div class="right">

<h3>👤 Player</h3>
<p id="player"></p>

<h3>📜 Quest Log</h3>
<div id="progressText"></div>
<div class="log" id="log"></div>

</div>

</div>

<audio id="music" loop></audio>

<script>

/* 5 WORLDS × 5 QUESTIONS */
const zones = [
{
name:"Goonsquad History",
music:"Overwatch.mp3",
bpm:90,
travel:"Entering Goonsquad archives...",
puzzles:Array.from({length:5},(_,i)=>({
q:`gq${i}`,
clue:`Goonsquad clue ${i+1}`,
hint:`Hidden Goonsquad hint ${i+1}`
}))
},
{
name:"Overwatch",
music:"Overwatch.mp3",
bpm:100,
travel:"Deploying to Overwatch...",
puzzles:Array.from({length:5},(_,i)=>({
q:`ow${i}`,
clue:`Overwatch clue ${i+1}`,
hint:`Overwatch hint ${i+1}`
}))
},
{
name:"The War Within",
music:"Overwatch.mp3",
bpm:85,
travel:"Entering Azeroth depths...",
puzzles:Array.from({length:5},(_,i)=>({
q:`tww${i}`,
clue:`War Within clue ${i+1}`,
hint:`TWW hint ${i+1}`
}))
},
{
name:"Jackbox Realm",
music:"Overwatch.mp3",
bpm:120,
travel:"Entering party chaos...",
puzzles:Array.from({length:5},(_,i)=>({
q:`jb${i}`,
clue:`Jackbox clue ${i+1}`,
hint:`Jackbox hint ${i+1}`
}))
},
{
name:"WoW Midnight",
music:"Overwatch.mp3",
bpm:95,
travel:"Entering Midnight...",
puzzles:Array.from({length:5},(_,i)=>({
q:`mid${i}`,
clue:`Midnight clue ${i+1}`,
hint:`Midnight hint ${i+1}`
}))
}
];

let player="", z=0, p=0;
let journal=[];
let muted=false;
let beatInterval;

/* START */
function start(){
player=document.getElementById("name").value||"Traveler";
document.getElementById("login").style.display="none";
document.getElementById("game").style.display="flex";
document.getElementById("player").innerText=player;

openDialog();
playMusic();
startBeatFX();
render();
}

/* DIALOG */
function openDialog(){
document.getElementById("dialog").style.display="flex";
document.getElementById("dTitle").innerText=zones[z].name;
document.getElementById("dText").innerText=zones[z].travel;
}

function acceptChoice(){
document.getElementById("dialog").style.display="none";
}

/* MUSIC */
function playMusic(){
let m=document.getElementById("music");
m.src=zones[z].music;
m.volume=1;
m.play();
}

/* MUTE */
function toggleMute(){
let m=document.getElementById("music");
muted=!muted;
m.muted=muted;
document.getElementById("muteBtn").innerText = muted ? "🔇" : "🔊";
}

/* BEAT VFX */
function startBeatFX(){
clearInterval(beatInterval);
let bpm = zones[z].bpm;
let interval = 60000 / bpm;

beatInterval = setInterval(()=>{
document.body.classList.add("flash");
setTimeout(()=>document.body.classList.remove("flash"),200);
}, interval);
}

/* ROAD */
function road(){
let r=document.getElementById("road");
r.innerHTML="";
zones.forEach((_,i)=>{
let d=document.createElement("div");
d.className="node";
if(i<z) d.classList.add("done");
if(i===z) d.classList.add("current");
r.appendChild(d);
});
}

/* RENDER */
function render(){
if(z>=zones.length){ end(); return; }

document.body.style.background=`url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa') center/cover`;

document.getElementById("zone").innerText=zones[z].name;
document.getElementById("clue").innerText=zones[z].puzzles[p].clue;

document.getElementById("progressText").innerText =
`Chapter ${z+1}: ${p}/${zones[z].puzzles.length}`;

road();
renderLog();
}

/* SUBMIT */
function submit(){
let v=document.getElementById("input").value.toLowerCase();

if(v===zones[z].puzzles[p].q){

document.body.classList.add("flash");
setTimeout(()=>document.body.classList.remove("flash"),300);

log("✔ "+v,true);

p++;

if(p>=zones[z].puzzles.length){
z++; p=0;

if(z<zones.length){
playMusic();
startBeatFX();
openDialog();
}
}

render();

} else {
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),300);

log("✖ wrong attempt");
}
}

/* LOG */
function log(t,done=false){
journal.unshift({t,done});
}

function renderLog(){
document.getElementById("log").innerHTML=
journal.map(j=>
`<div class="${j.done?'doneText':''}">${j.t}</div>`
).join("");
}

/* END */
function end(){
document.getElementById("game").style.display="none";
alert("🏆 Journey Complete");
}

</script>

</body>
</html>
