<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quest Journey RPG</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
margin:0;
font-family:Cinzel, serif;
background-size:cover;
background-position:center;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
transition:1s;
color:#f5e6c8;
}

#login {
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

.box {
background:rgba(20,14,8,0.95);
padding:25px;
border:2px solid #c9a227;
border-radius:12px;
width:300px;
text-align:center;
}

#game {
display:none;
width:900px;
height:600px;
background:rgba(0,0,0,0.65);
border:2px solid #c9a227;
border-radius:12px;
overflow:hidden;
}

.left {
flex:3;
padding:25px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.right {
flex:1;
background:rgba(0,0,0,0.75);
padding:20px;
border-left:2px solid #c9a227;
overflow-y:auto;
}

.map {
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.node {
width:12px;
height:12px;
border-radius:50%;
background:#c9a227;
opacity:0.35;
}

.node.big {
width:20px;
height:20px;
opacity:1;
box-shadow:0 0 10px #c9a227;
}

.node.completed {
opacity:1;
}

.node.current {
animation:pulse 1s infinite;
opacity:1;
}

@keyframes pulse {
0%{transform:scale(1)}
50%{transform:scale(1.4)}
100%{transform:scale(1)}
}

input {
width:250px;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #c9a227;
background:rgba(0,0,0,0.5);
color:#f5e6c8;
text-align:center;
}

button {
width:150px;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
cursor:pointer;
}

#muteBtn {
position:fixed;
top:10px;
right:10px;
background:#c9a227;
border:none;
padding:8px 10px;
border-radius:8px;
cursor:pointer;
}

.shake {
animation:shake 0.3s;
}

@keyframes shake {
0%{transform:translate(0)}
25%{transform:translate(5px)}
50%{transform:translate(-5px)}
100%{transform:translate(0)}
}
</style>
</head>

<body>

<button id="muteBtn" onclick="toggleMute()">🔊</button>

<div id="login">
<div class="box">
<h2>Enter Name</h2>
<input id="name">
<button onclick="start()">Begin Journey</button>
</div>
</div>

<div id="game">

<div class="left">

<div class="map" id="map"></div>

<h2 id="zone"></h2>
<p id="clue"></p>

<input id="input">
<button id="submitBtn" onclick="submit()">Submit</button>

</div>

<div class="right">
<h3>Progress</h3>
<p id="progress"></p>

<h3>Attempts</h3>
<div id="attempts"><em>No failed attempts</em></div>
</div>

</div>

<audio id="music" loop></audio>

<script>

const zones = [
{
name:"Overwatch",
music:"Overwatch.mp3",
bg:"https://images.unsplash.com/photo-1446776811953-b23d57bd21aa",
puzzles:[
{q:"tracer", clue:"Fastest hero."},
{q:"reaper", clue:"Death walks again."},
{q:"overwatch", clue:"Hero organization."}
]
},
{
name:"The War Within",
music:"Warwithin.mp3",
bg:"https://r4.wallpaperflare.com/wallpaper/698/492/43/world-of-warcraft-world-of-warcraft-the-war-within-hd-wallpaper-3a52424eeb03db6148e64273c8a63109.jpg",
puzzles:[
{q:"khaz algar", clue:"Deep titan domain."},
{q:"dornogal", clue:"City of earth."},
{q:"earthen", clue:"New titan race."}
]
},
{
name:"Midnight",
music:"Warwithin.mp3",
bg:"https://r4.wallpaperflare.com/wallpaper/224/132/933/world-of-warcraft-warcraft-world-of-warcraft-midnight-blood-elves-hd-wallpaper-0ae3578987f2a8ee6dd8471e4853cca4.jpg",
puzzles:[
{q:"quelthalas", clue:"Elven homeland."},
{q:"sunwell", clue:"Arcane source."},
{q:"scourge", clue:"Undead threat."}
]
}
];

let z=0;
let p=0;
let muted=false;
let attempts=[];
let locked=false;

function start(){
document.getElementById("login").style.display="none";
document.getElementById("game").style.display="flex";
playMusic();
render();
}

function playMusic(){
let m=document.getElementById("music");
m.src=zones[z].music;
m.volume=1;
if(!muted) m.play();
}

function toggleMute(){
let m=document.getElementById("music");
muted=!muted;
m.muted=muted;
document.getElementById("muteBtn").innerText = muted ? "🔇" : "🔊";
}

function renderMap(){

let map=document.getElementById("map");
map.innerHTML="";

zones.forEach((zone, zoneIndex)=>{

let big=document.createElement("div");
big.className="node big";

if(zoneIndex===z){
big.classList.add("current");
}

if(zoneIndex<z){
big.classList.add("completed");
}

map.appendChild(big);

if(zoneIndex < zones.length-1){

for(let q=0;q<zone.puzzles.length;q++){

let small=document.createElement("div");
small.className="node";

if(zoneIndex < z){
small.classList.add("completed");
}

if(zoneIndex===z && q<p){
small.classList.add("completed");
}

if(zoneIndex===z && q===p){
small.classList.add("current");
}

map.appendChild(small);
}
}
});
}

function updateQuestLog(){

const log=document.getElementById("attempts");

if(attempts.length===0){
log.innerHTML="<em>No failed attempts</em>";
return;
}

log.innerHTML=attempts.map(a=>"• "+a).join("<br>");
}

function render(){

if(z>=zones.length){
document.body.innerHTML="<h1>🏆 Victory</h1>";
return;
}

document.body.style.background=`url('${zones[z].bg}') center/cover`;

document.getElementById("zone").innerText=zones[z].name;
document.getElementById("clue").innerText=zones[z].puzzles[p].clue;

document.getElementById("progress").innerText =
`Chapter ${z+1}: ${p+1}/${zones[z].puzzles.length}`;

renderMap();
updateQuestLog();
}

function startLockout(){

locked=true;

let remaining=15;
const btn=document.getElementById("submitBtn");

btn.disabled=true;
btn.innerText=`Wait ${remaining}s`;

const timer=setInterval(()=>{

remaining--;
btn.innerText=`Wait ${remaining}s`;

if(remaining<=0){
clearInterval(timer);
locked=false;
btn.disabled=false;
btn.innerText="Submit";
}

},1000);
}

function submit(){

if(locked) return;

const input=document.getElementById("input");
const value=input.value.toLowerCase().trim();

input.value="";

if(!value) return;

if(value===zones[z].puzzles[p].q){

attempts=[];

p++;

if(p>=zones[z].puzzles.length){
z++;
p=0;

if(z<zones.length){
playMusic();
}
}

render();

}else{

attempts.push(value);
updateQuestLog();

document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),300);

startLockout();
}
}

document.addEventListener("DOMContentLoaded", ()=>{

document.getElementById("input").addEventListener("keydown", e=>{
if(e.key==="Enter"){
submit();
}
});

});
</script>

</body>
</html>
