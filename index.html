<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WoW Journey RPG</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
margin:0;
font-family:Cinzel, serif;
color:white;
background-size:cover;
background-position:center;
overflow:hidden;
transition:1s;
}

/* CLASS COLORS */
:root {
--warrior:#c79c6e;
--mage:#69ccf0;
--rogue:#fff569;
--priest:#ffffff;
--hunter:#abd473;
}

/* LOGIN */
#login {
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

.box {
background:rgba(0,0,0,0.85);
padding:20px;
border-radius:10px;
text-align:center;
border:2px solid white;
}

.classBtn {
margin:5px;
padding:5px;
cursor:pointer;
}

/* GAME */
#game {
display:none;
height:100vh;
justify-content:center;
align-items:center;
}

/* UI PANEL */
.panel {
width:900px;
height:600px;
display:flex;
border:2px solid white;
background:rgba(0,0,0,0.6);
border-radius:12px;
overflow:hidden;
}

/* LEFT */
.left {
flex:3;
padding:20px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* RIGHT */
.right {
flex:1;
padding:15px;
border-left:2px solid white;
}

/* ROAD */
.road {
display:flex;
gap:10px;
position:relative;
margin-bottom:20px;
}

.node {
width:12px;
height:12px;
border-radius:50%;
border:2px solid white;
opacity:0.3;
transition:0.5s;
}

.node.done { opacity:1; }
.node.current { transform:scale(1.4); }

/* CHARACTER */
#hero {
width:20px;
height:20px;
border-radius:50%;
position:absolute;
top:-30px;
transition:1s linear;
}

/* INPUT */
input {
width:200px;
padding:10px;
margin-top:10px;
text-align:center;
}

/* QUEST LOG */
.log {
font-size:12px;
overflow:auto;
height:200px;
}

.done {
text-decoration:line-through;
opacity:0.5;
}

/* TRAVEL */
#travel {
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
color:white;
}

/* CLASS COLORS APPLY */
.class-warrior { color:var(--warrior); }
.class-mage { color:var(--mage); }
.class-rogue { color:var(--rogue); }
.class-priest { color:var(--priest); }
.class-hunter { color:var(--hunter); }

.flash { animation:flash 0.4s; }
.shake { animation:shake 0.3s; }

@keyframes flash { 0%{opacity:0.3} 100%{opacity:1} }
@keyframes shake {
0%{transform:translate(0)}
25%{transform:translate(5px)}
50%{transform:translate(-5px)}
75%{transform:translate(5px)}
100%{transform:translate(0)}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h2>Select Class</h2>

<button class="classBtn" onclick="pick('warrior')">Warrior</button>
<button class="classBtn" onclick="pick('mage')">Mage</button>
<button class="classBtn" onclick="pick('rogue')">Rogue</button>
<button class="classBtn" onclick="pick('priest')">Priest</button>
<button class="classBtn" onclick="pick('hunter')">Hunter</button>

<input id="name" placeholder="Name">
<button onclick="start()">Start Journey</button>
</div>
</div>

<!-- TRAVEL -->
<div id="travel">
<h2 id="travelText"></h2>
</div>

<!-- GAME -->
<div id="game">
<div class="panel">

<div class="left">

<div class="road" id="road"></div>

<h2 id="zone"></h2>
<p id="clue"></p>

<input id="input">
<button onclick="submit()">Submit</button>

</div>

<div class="right">
<h3 id="player"></h3>
<h4 id="progress"></h4>
<div class="log" id="log"></div>
</div>

</div>
</div>

<audio id="music" loop></audio>

<script>

/* CLASS SYSTEM */
let selectedClass="warrior";
let classColor="var(--warrior)";

function pick(c){
selectedClass=c;
classColor=getComputedStyle(document.documentElement)
.getPropertyValue(`--${c}`).trim();
}

/* WORLDS */
const zones=[
{
name:"The War Within",
bg:"https://r4.wallpaperflare.com/wallpaper/698/492/43/world-of-warcraft-world-of-warcraft-the-war-within-hd-wallpaper-3a52424eeb03db6148e64273c8a63109.jpg",
music:"Warwithin.mp3",
puzzles:[
{q:"xal'atath", clue:"Old god artifact", hint:"Blade whispering void"},
{q:"khaz algar", clue:"Deep zone", hint:"Underground continent"},
{q:"dornogal", clue:"Titan city", hint:"Earthen capital"},
{q:"earthen", clue:"New race", hint:"Stone beings"},
{q:"alliance", clue:"Faction", hint:"Blue banner"}
]
},

{
name:"Riddles",
music:"Warwithin.mp3",
puzzles:[
{q:"echo", clue:"I repeat but have no voice", hint:"Sound reflection"},
{q:"shadow", clue:"I follow light", hint:"Darkness"},
{q:"time", clue:"I pass but never return", hint:"Clock concept"},
{q:"mirror", clue:"I show you but am not you", hint:"Reflection"},
{q:"silence", clue:"I can be loud", hint:"No sound"}
]
},

{
name:"WoW Trivia",
music:"Warwithin.mp3",
puzzles:[
{q:"arthas", clue:"Lich King", hint:"Fallen prince"},
{q:"azeroth", clue:"World name", hint:"Planet"},
{q:"horde", clue:"Faction", hint:"For the ___"},
{q:"alliance", clue:"Faction", hint:"Blue side"},
{q:"stormwind", clue:"Human city", hint:"Capital"}
]
},

{
name:"Overwatch",
music:"Warwithin.mp3",
puzzles:[
{q:"tracer", clue:"Blink hero", hint:"Time jumper"},
{q:"winston", clue:"Gorilla scientist", hint:"Tank"},
{q:"reaper", clue:"Shotguns", hint:"Shadow form"},
{q:"genji", clue:"Cyber ninja", hint:"Blade"},
{q:"payload", clue:"Objective", hint:"Escort target"}
]
},

{
name:"Midnight",
music:"Warwithin.mp3",
bg:"https://r4.wallpaperflare.com/wallpaper/224/132/933/world-of-warcraft-warcraft-world-of-warcraft-midnight-blood-elves-hd-wallpaper-0ae3578987f2a8ee6dd8471e4853cca4.jpg",
puzzles:[
{q:"blood elf", clue:"Arcane race", hint:"Sin'dorei"},
{q:"sunwell", clue:"Power source", hint:"Holy magic well"},
{q:"quel'thalas", clue:"Kingdom", hint:"Elf homeland"},
{q:"silverymoon", clue:"City", hint:"Elven magic city"},
{q:"midnight", clue:"Expansion name", hint:"Darkness era"}
]
}
];

let z=0,p=0,player="";

/* START */
function start(){
player=document.getElementById("name").value;
document.getElementById("login").style.display="none";
document.getElementById("game").style.display="flex";

document.body.style.color=classColor;

loadWorld();
render();
}

/* TRAVEL ANIMATION */
function loadWorld(){
document.getElementById("travel").style.display="flex";
document.getElementById("travelText").innerText="Traveling... "+zones[z].name;

setTimeout(()=>{
document.getElementById("travel").style.display="none";
},3000);
}

/* ROAD */
function road(){
let r=document.getElementById("road");
r.innerHTML="";
zones.forEach((_,i)=>{
let d=document.createElement("div");
d.className="node";
if(i<z) d.classList.add("done");
if(i===z) d.classList.add("current");
r.appendChild(d);
});
}

/* RENDER */
function render(){
if(z>=zones.length){
alert("DONE");
return;
}

document.getElementById("zone").innerText=zones[z].name;
document.getElementById("clue").innerText=zones[z].puzzles[p].clue;
document.getElementById("progress").innerText=
`Chapter ${z+1}: ${p+1}/${zones[z].puzzles.length}`;

road();
}

/* SUBMIT */
function submit(){
let v=document.getElementById("input").value.toLowerCase();

if(v===zones[z].puzzles[p].q){
flash(true);

p++;
if(p>=zones[z].puzzles.length){
z++; p=0;
loadWorld();
}

render();
}
else{
flash(false);
}
}

/* FX */
function flash(ok){
document.body.classList.add(ok?"flash":"shake");
setTimeout(()=>document.body.classList.remove(ok?"flash":"shake"),300);
}

</script>

</body>
</html>
