<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Journey RPG</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
margin:0;
font-family:Cinzel, serif;
color:#f5e6c8;
background-size:cover;
background-position:center;
transition:1s;
overflow:hidden;
}

/* LOGIN */
#login {
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

.box {
background:rgba(20,14,8,0.95);
padding:25px;
border:2px solid #c9a227;
border-radius:12px;
width:300px;
}

/* GAME */
#game {
display:none;
height:100vh;
display:flex;
}

.left {
flex:3;
padding:20px;
}

.right {
flex:1;
background:rgba(0,0,0,0.75);
padding:20px;
border-left:2px solid #c9a227;
}

/* ROAD */
.road {
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
position:relative;
}

.road::before {
content:"";
position:absolute;
width:100%;
height:2px;
background:#c9a227;
opacity:0.4;
top:50%;
}

.node {
width:14px;
height:14px;
border-radius:50%;
border:2px solid #c9a227;
background:black;
opacity:0.3;
z-index:2;
}

.node.done { background:#c9a227; opacity:1; }
.node.current { animation:pulse 1s infinite; }

@keyframes pulse {
0%{transform:scale(1)}
50%{transform:scale(1.4)}
100%{transform:scale(1)}
}

/* INPUT */
input, button {
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

input {
background:rgba(0,0,0,0.5);
color:#f5e6c8;
border:1px solid #c9a227;
}

/* QUEST LOG */
.log {
margin-top:10px;
font-size:12px;
max-height:180px;
overflow:auto;
}

.logEntry {
margin-bottom:5px;
}

.doneText {
text-decoration:line-through;
opacity:0.5;
}

/* SPELL EFFECTS */
.flash-green {
animation:greenFlash 0.5s;
}

.flash-red {
animation:redFlash 0.5s;
}

@keyframes greenFlash {
0%{box-shadow:0 0 0 #0f0}
50%{box-shadow:0 0 40px #0f0}
100%{box-shadow:0 0 0 #0f0}
}

@keyframes redFlash {
0%{background:#000}
50%{background:#400}
100%{background:#000}
}

/* QUEST DIALOG */
#dialog {
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.8);
}

.dialogBox {
background:#1a1410;
border:2px solid #c9a227;
padding:20px;
width:400px;
}

/* LOADING */
#loading {
position:fixed;
inset:0;
display:none;
background:black;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

#loading p {
color:#ffd36a;
}

/* MUSIC */
audio {
display:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h2>Enter Name</h2>
<input id="name">
<button onclick="start()">Begin Journey</button>
</div>
</div>

<!-- LOADING -->
<div id="loading">
<h2 id="travelTitle"></h2>
<p id="travelText"></p>
</div>

<!-- QUEST DIALOG -->
<div id="dialog">
<div class="dialogBox">
<h3 id="dTitle"></h3>
<p id="dText"></p>
<button onclick="closeDialog()">Accept Quest</button>
</div>
</div>

<!-- GAME -->
<div id="game">

<div class="left">

<div class="road" id="road"></div>

<h2 id="zone"></h2>
<p id="clue"></p>

<p id="progress"></p>

<input id="input">
<button onclick="submit()">Submit</button>

<div id="msg"></div>

</div>

<div class="right">

<h3>👤 Player</h3>
<p id="player"></p>

<h3>🎒 Inventory</h3>
<div id="inv"></div>

<h3>📜 Quest Log</h3>
<div class="log" id="log"></div>

</div>

</div>

<!-- MUSIC -->
<audio id="music" loop></audio>

<script>

/* WORLD */
const zones = [
{
name:"Overwatch",
bg:"https://blz-contentstack-images.akamaized.net/v3/assets/blt2477dcaf4ebd440c/bltdabc3782553659f1/6785b50a1970a9f14eb5ccd7/xboxshowcase.png",
music:"music/overwatch.mp3",
travel:"Entering Overwatch Watchpoint...",
puzzles:[
{q:"tracer", clue:"Fastest hero.", hint:"Time user."},
{q:"reaper", clue:"Death walks again.", hint:"Shadow assassin."},
{q:"overwatch", clue:"Organization reborn.", hint:"Hero force."}
],
item:"Pulse Badge"
},
{
name:"League of Legends",
bg:"https://www.allkeyshop.com/blog/wp-content/uploads/LoL-Champions-resized.webp",
music:"music/lol.mp3",
travel:"Crossing into the Rift...",
puzzles:[
{q:"yasuo", clue:"Wind never stops.", hint:"Wind swordsman."},
{q:"jinx", clue:"Chaos follows.", hint:"Explosive chaos."},
{q:"nexus", clue:"Core of battle.", hint:"Main structure."}
],
item:"Hex Core"
},
{
name:"World of Warcraft",
bg:"https://bnetcmsus-a.akamaihd.net/cms/blog_header/wn/WNVJRL5YVDSB1764095280016.png",
music:"music/wow.mp3",
travel:"Entering Azeroth...",
puzzles:[
{q:"arthas", clue:"Fallen king.", hint:"Lich King."},
{q:"horde", clue:"For the Horde.", hint:"Faction warcry."},
{q:"azeroth", clue:"The world itself.", hint:"Planet name."}
],
item:"Frost Relic"
}
];

let player="", z=0, p=0;
let inv=[];
let journal=[];

/* START */
function start(){
player=document.getElementById("name").value||"Traveler";
document.getElementById("login").style.display="none";
document.getElementById("game").style.display="flex";
document.getElementById("player").innerText=player;

openDialog(z);

playMusic();
render();
}

/* DIALOG */
function openDialog(i){
document.getElementById("dialog").style.display="flex";
document.getElementById("dTitle").innerText=zones[i].name;
document.getElementById("dText").innerText=zones[i].travel;
}

function closeDialog(){
document.getElementById("dialog").style.display="none";
travel();
}

/* MUSIC */
function playMusic(){
let m=document.getElementById("music");
m.src=zones[z].music;
m.volume=0;
m.play();

let fade=setInterval(()=>{
if(m.volume<0.5) m.volume+=0.05;
else clearInterval(fade);
},200);
}

/* TRAVEL */
function travel(){
document.getElementById("loading").style.display="flex";

setTimeout(()=>{
document.getElementById("loading").style.display="none";
document.body.style.background=`url('${zones[z].bg}') center/cover`;
render();
},10000);
}

/* ROAD */
function road(){
let r=document.getElementById("road");
r.innerHTML="";
zones.forEach((_,i)=>{
let d=document.createElement("div");
d.className="node";
if(i<z) d.classList.add("done");
if(i===z) d.classList.add("current");
r.appendChild(d);
});
}

/* RENDER */
function render(){
if(z>=zones.length){ end(); return; }

document.getElementById("zone").innerText=zones[z].name;
document.getElementById("clue").innerText=zones[z].puzzles[p].clue;
document.getElementById("progress").innerText=
`Chapter ${z+1}: ${p}/${zones[z].puzzles.length}`;

road();
renderInv();
renderLog();
}

/* INVENTORY */
function renderInv(){
document.getElementById("inv").innerHTML=
inv.map((i,idx)=>`<div onclick="use(${idx})">${i}</div>`).join("");
}

function use(i){
if(!confirm("Use item for hint?")) return;
alert(zones[z].puzzles[p].hint);
inv.splice(i,1);
log("Hint used");
renderInv();
}

/* SUBMIT */
function submit(){
let v=document.getElementById("input").value.toLowerCase();

if(v===zones[z].puzzles[p].q){

document.getElementById("input").value="";

spell(true);
log("Completed: "+v,true);

p++;

if(p>=zones[z].puzzles.length){
inv.push(zones[z].item);
z++; p=0;

if(z<zones.length){
openDialog(z);
playMusic();
travel();
}
}

render();

} else {
spell(false);
log("Wrong attempt");
}
}

/* SPELL EFFECTS */
function spell(success){
let b=document.body;

if(success){
b.classList.add("flash-green");
setTimeout(()=>b.classList.remove("flash-green"),500);
} else {
b.classList.add("flash-red");
setTimeout(()=>b.classList.remove("flash-red"),500);
}
}

/* LOG */
function log(t,done=false){
journal.unshift({t,done});
}

function renderLog(){
document.getElementById("log").innerHTML=
journal.map(j=>
`<div class="${j.done?'doneText':''}">${j.t}</div>`
).join("");
}

/* END */
function end(){
document.getElementById("game").style.display="none";
document.getElementById("dialog").style.display="none";
alert("🏆 Journey Complete");
}

</script>

</body>
</html>
