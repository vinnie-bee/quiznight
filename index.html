<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World of Echoes</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: "Cinzel", serif;
    color: #f5e6c8;
    background-size: cover;
    background-position: center;
    transition: 1s;
}

/* LOGIN */
#login {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: black;
}

.loginBox {
    background: rgba(20,14,8,0.95);
    padding: 30px;
    border: 2px solid #c9a227;
    border-radius: 15px;
    width: 300px;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}

/* GAME LAYOUT */
#game {
    display: none;
    height: 100vh;
    display: flex;
}

.left {
    flex: 3;
    padding: 20px;
}

.right {
    flex: 1;
    background: rgba(0,0,0,0.7);
    padding: 20px;
    border-left: 2px solid #c9a227;
}

/* ROAD MAP */
.road {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
}

.node {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid #c9a227;
    background: transparent;
    opacity: 0.4;
}

.node.active {
    background: #c9a227;
    opacity: 1;
}

.node.current {
    box-shadow: 0 0 10px #ffd36a;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}

/* UI */
#clue {
    font-size: 20px;
    margin-top: 20px;
}

.msg { margin-top: 10px; min-height: 20px; }

.success { color: #7CFC90; }
.error { color: #ff6b6b; }

/* INVENTORY */
.item {
    display: inline-block;
    padding: 5px 8px;
    margin: 3px;
    border: 1px solid #c9a227;
    border-radius: 6px;
    font-size: 12px;
}

/* LOADING SCREEN */
#loading {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
}

.fact {
    margin-top: 20px;
    color: #ffd36a;
    max-width: 500px;
}

/* VICTORY */
#victory {
    display: none;
    text-align: center;
    padding: 50px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="loginBox">
    <h2>Enter your name</h2>
    <input id="name" placeholder="Username">
    <button onclick="start()">Enter World</button>
  </div>
</div>

<!-- LOADING -->
<div id="loading">
  <h2>Travelling...</h2>
  <p id="zoneName"></p>
  <div class="fact" id="fact"></div>
</div>

<!-- GAME -->
<div id="game">

<div class="left">

<div class="road" id="road"></div>

<h2 id="zoneTitle"></h2>
<p id="clue"></p>

<input id="input" placeholder="Enter rune..." />
<button onclick="submit()">Submit</button>

<div class="msg" id="msg"></div>

</div>

<div class="right">

<h3>👤 Player</h3>
<p id="player"></p>

<h3>🎒 Inventory</h3>
<div id="inv"></div>

</div>

</div>

<!-- VICTORY -->
<div id="victory">
<h1>🏆 WORLD COMPLETED</h1>
<p id="finalText"></p>
</div>

<script>

/* 10 ZONES, 3 PUZZLES EACH */
const zones = [
{
name:"Elwynn Crossing",
theme:"WoW",
bg:"https://images.unsplash.com/photo-1503264116251-35a269479413",
puzzles:[
{q:"dragon", clue:"Fire sleeps beneath stone."},
{q:"ember", clue:"The first spark remains."},
{q:"lion", clue:"King of the early lands."}
],
item:"Lion Crest"
},
{
name:"Piltover Gate",
theme:"LoL",
bg:"https://images.unsplash.com/photo-1519681393784-d120267933ba",
puzzles:[
{q:"hextech", clue:"Magic meets machine."},
{q:"jinx", clue:"Chaos leaves clues."},
{q:"arcane", clue:"Knowledge forbidden."}
],
item:"Hex Crystal"
},
{
name:"Dreamlight Valley",
theme:"Disney",
bg:"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
puzzles:[
{q:"stitch", clue:"Experiment hides here."},
{q:"magic", clue:"Wishes become real."},
{q:"castle", clue:"Dreams begin here."}
],
item:"Dream Shard"
}
];

let player = "";
let z = parseInt(localStorage.getItem("z")) || 0;
let p = parseInt(localStorage.getItem("p")) || 0;
let inv = JSON.parse(localStorage.getItem("inv") || "[]");

const facts = [
"Tip: Every zone has 3 secrets.",
"Hint: Inventory items may be used later.",
"Some answers are hidden in plain sight.",
"The road is longer than it looks."
];

function start(){
player = document.getElementById("name").value || "Traveler";
document.getElementById("login").style.display="none";
document.getElementById("game").style.display="flex";
document.body.style.background = zones[z].bg;
document.getElementById("player").innerText = player;
render();
}

function renderRoad(){
let road = document.getElementById("road");
road.innerHTML = "";

zones.forEach((_,i)=>{
let node = document.createElement("div");
node.className = "node";
if(i < z) node.classList.add("active");
if(i === z) node.classList.add("current");
road.appendChild(node);
});
}

function render(){
renderRoad();

if(z >= zones.length){
end();
return;
}

let zone = zones[z];

document.body.style.background = zone.bg;

document.getElementById("zoneTitle").innerText =
zone.name + " (" + zone.theme + ")";

document.getElementById("clue").innerText =
zone.puzzles[p].clue;

document.getElementById("inv").innerHTML =
inv.map(i=>`<span class="item">${i}</span>`).join("");
}

function submit(){

let val = document.getElementById("input").value.toLowerCase().trim();
let msg = document.getElementById("msg");

let zone = zones[z];

if(val === zone.puzzles[p].q){

msg.textContent = "✔ Correct";

p++;

if(p >= zone.puzzles.length){
inv.push(zone.item);
z++;
p = 0;
showLoading();
} else {
msg.textContent = "✔ Next clue unlocked";
}

save();

render();

} else {
msg.textContent = "✖ Wrong";
}
}

function showLoading(){
document.getElementById("loading").style.display="flex";

document.getElementById("zoneName").innerText =
zones[z]?.name || "Unknown";

document.getElementById("fact").innerText =
facts[Math.floor(Math.random()*facts.length)];

setTimeout(()=>{
document.getElementById("loading").style.display="none";
render();
},2500);
}

function save(){
localStorage.setItem("z",z);
localStorage.setItem("p",p);
localStorage.setItem("inv",JSON.stringify(inv));
}

function end(){
document.getElementById("game").style.display="none";
document.getElementById("victory").style.display="block";

document.getElementById("finalText").innerText =
player + ", you have completed the world journey.";
}

</script>

</body>
</html>
