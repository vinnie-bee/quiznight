<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quest of Shadows</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    min-height: 100vh;
    font-family: "Cinzel", serif;
    color: #f5e6c8;
    background: url("https://images.unsplash.com/photo-1503264116251-35a269479413") center/cover fixed;
    transition: 0.6s;
}

.overlay {
    min-height: 100vh;
    background: rgba(0,0,0,0.65);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px;
}

.card {
    width: min(900px, 95%);
    background: rgba(20, 14, 8, 0.92);
    border: 2px solid #c9a227;
    border-radius: 18px;
    padding: 30px;
    box-shadow: 0 0 40px rgba(255, 200, 80, 0.15);
}

h1 {
    text-align: center;
    margin-top: 0;
    color: #ffd36a;
}

.progress {
    height: 10px;
    background: #2b2115;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 15px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,#c9a227,#ffda77);
    transition: 0.4s;
}

.zone {
    font-size: 14px;
    color: #ffdf9a;
    margin-bottom: 10px;
    opacity: 0.9;
}

.clue {
    font-size: 20px;
    margin: 20px 0;
    min-height: 60px;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    margin-bottom: 10px;
}

button {
    width: 100%;
    padding: 14px;
    background: #c9a227;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    filter: brightness(1.1);
}

.msg {
    margin-top: 15px;
    min-height: 30px;
}

.success { color: #7CFC90; }
.error { color: #ff6b6b; }

.inventory {
    margin-top: 20px;
    font-size: 14px;
    border-top: 1px solid #3a2f1d;
    padding-top: 10px;
}

.badge {
    display: inline-block;
    background: #2b2115;
    border: 1px solid #c9a227;
    padding: 5px 10px;
    margin: 5px;
    border-radius: 8px;
    font-size: 12px;
}

.victory {
    text-align: center;
    display: none;
}

.glow {
    animation: glow 0.6s ease;
}

@keyframes glow {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>
<div class="overlay">
<div class="card">

<h1>⚔️ Quest of Shadows</h1>

<div class="progress">
    <div class="progress-bar" id="bar"></div>
</div>

<div id="game">

<div class="zone" id="zone"></div>

<div class="clue" id="clue"></div>

<input id="input" placeholder="Enter ancient password..." />

<button onclick="submit()">Submit Rune</button>

<div class="msg" id="msg"></div>

<div class="inventory">
🧳 Inventory:
<div id="inv"></div>
</div>

</div>

<div class="victory" id="victory">
    <h2>🏆 LEGENDARY COMPLETED</h2>
    <p>You have finished the Quest of Shadows.</p>
    <p style="color:#ffd36a;">Only a few are worthy.</p>
    <button onclick="reset()">Restart Journey</button>
</div>

</div>
</div>

<script>
const stages = [
{
zone:"The Forgotten Gate",
password:"dragon",
clue:"Where fire once slept, the first truth is hidden.",
bg:"https://images.unsplash.com/photo-1503264116251-35a269479413",
item:"Ember Sigil"
},
{
zone:"Hall of Echoes",
password:"phoenix",
clue:"What dies returns, but never the same.",
bg:"https://images.unsplash.com/photo-1519681393784-d120267933ba",
item:"Echo Fragment"
},
{
zone:"Vault of Stars",
password:"nebula",
clue:"Look to the endless sea above.",
bg:"https://images.unsplash.com/photo-1446776811953-b23d57bd21aa",
item:"Star Dust"
},
{
zone:"Final Chamber",
password:"treasure",
clue:"Speak the name of what you seek.",
bg:"https://images.unsplash.com/photo-1470770841072-f978cf4d019e",
item:"Crown of Completion"
}
];

let index = parseInt(localStorage.getItem("quest_index")) || 0;
let inventory = JSON.parse(localStorage.getItem("quest_inv") || "[]");

function save(){
localStorage.setItem("quest_index", index);
localStorage.setItem("quest_inv", JSON.stringify(inventory));
}

function update(){
if(index >= stages.length){
document.getElementById("game").style.display="none";
document.getElementById("victory").style.display="block";
document.getElementById("bar").style.width="100%";
return;
}

let s = stages[index];

document.body.style.background = `url('${s.bg}') center/cover fixed`;

document.getElementById("zone").innerText =
"Zone: " + s.zone;

document.getElementById("clue").innerText =
s.clue;

document.getElementById("bar").style.width =
(index/stages.length)*100 + "%";

document.getElementById("inv").innerHTML =
inventory.map(i => `<span class="badge">${i}</span>`).join("");
}

function submit(){
let val = document.getElementById("input").value.toLowerCase().trim();
let msg = document.getElementById("msg");

if(val === "azeroth"){
msg.innerText = "👁 You should not know this...";
return;
}

if(val === stages[index].password){

inventory.push(stages[index].item);
index++;

save();

msg.className="msg success";
msg.innerText="✔ Rune accepted...";

document.querySelector(".card").classList.add("glow");
setTimeout(()=>{
document.querySelector(".card").classList.remove("glow");
msg.innerText="";
document.getElementById("input").value="";
update();
},700);

} else {
msg.className="msg error";
msg.innerText="✖ The runes reject you.";
}
}

function reset(){
localStorage.clear();
location.reload();
}

update();
</script>

</body>
</html>
